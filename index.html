<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Premier Chemical Supplier from China | Sinopeakchem</title>
    <meta name="description" content="Sinopeakchem is a leading B2B chemical supplier from China." />
    <meta name="author" content="Sinopeakchem" />

    <!-- Performance Optimizations -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Anti-FOUC & Critical CSS -->
    <style>
      /* 1. Loading Mask Style */
      #loading-mask {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #ffffff;
        z-index: 99999;
        transition: opacity 0.4s ease, visibility 0.4s;
      }
      
      .dark #loading-mask {
        background-color: #030712;
      }

      #loading-mask.fade-out {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      /* 2. Disable initial animations to prevent layout jumping */
      .no-animate *,
      .no-animate *::before,
      .no-animate *::after {
        animation-duration: 0s !important;
        animation-delay: 0s !important;
        transition-duration: 0s !important;
        transition-delay: 0s !important;
      }

      /* 3. Critical Layout Styles to minimize CLS */
      #root {
        min-height: 100vh;
      }

      #root:not(.loaded) {
        opacity: 0;
      }

      /* Pre-define Hero section structure to avoid shift */
      .hero {
        padding: 4rem 1rem;
        text-align: center;
        min-height: 400px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        background-color: #f9fafb;
      }

      .dark .hero {
        background-color: #111827;
      }

      .hero h1 {
        font-size: 2.25rem;
        line-height: 2.5rem;
        margin-bottom: 1.5rem;
        font-weight: 700;
      }

      .product-grid {
        display: grid;
        grid-template-columns: repeat(1, minmax(0, 1fr));
        gap: 1.5rem;
        padding: 1rem;
      }

      @media (min-width: 768px) {
        .product-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (min-width: 1024px) {
        .product-grid {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }
      }

      .product-item, .product-card {
        min-height: 350px;
        background-color: #ffffff;
        border-radius: 0.5rem;
      }
    </style>

    <script>
      /* Immediately add no-animate class to prevent initial jumping */
      document.documentElement.classList.add('no-animate');
      
      /* Dark mode detection */
      (function() {
        var theme = localStorage.getItem('theme') || 
                    (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        if (theme === 'dark') {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <!-- Loading Mask to hide unstyled content -->
    <div id="loading-mask"></div>
    
    <div id="root"></div>
    
    <!-- Use defer to ensure main script doesn't block HTML parsing -->
    <script type="module" src="/src/main.tsx" defer></script>
  </body>
</html>
