name: Monthly SEO Date Update

on:
  schedule:
    # 每月 1 号凌晨 0 点运行 (UTC)
    - cron: '0 0 1 * *'
  workflow_dispatch: # 允许您随时在 Actions 页面手动点击运行

jobs:
  update-dates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run date update script
        run: python scripts/update-blog-dates.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --staged --quiet; then
            echo "No dates needed updating"
          else
            git commit -m "seo: monthly update of blog post dates for freshness"
            git push
          fi
